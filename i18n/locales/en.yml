pages:
  about:
    title: About
    intro:
      title: Introduction
      content: |-
        This site displays records of players who have achieved above a threshold score in the Extra and Phantasm modes of the Touhou STGs.
    publish_record:
      title: About Publishing Records
      content: |-
        Replays are collected on publicly available sites such as {silentselene} or other replay uploading sites.  {br}
        Game clear replays will be registered. {br}
        Replays with a slow rate greater than 3% or suspected use of cheat tools will not be registered. {br}
        Scores without replay evidence are added at the discretion of the administrator. {br}
        If you would like to add or remove a replay, please contact the administrator, {nyanko} {br}
      tags:
        silentselene: Silentselene
        nyanko: Nyanko
    using_tools:
      title: Using External Tools
      content: |-
          The permitted external tools are: {br}
          vpatch, for the purpose of improving the performance of the game. Bug fixes such as the fix for the Marisa B laser bug in MoF are prohibited. {br}
          thprac, for the purpose of practice and desync prevention. Using any of the cheat options in live play is prohibited, except in UM, in which the use of Market Manipulation is allowed. The full play must obtain the cards in the shop. {br}
          For plays where PIV was modified using external tools in th20, if the threshold is exceeded when replaying without external tools, they will be subject to publishing.
    compatible_games:
      title: Compatible Games
    threshold_scores:
      title: Threshold Scores
    threshold_score_policy:
      title: Threshold Score Policy
      good:
        content: |-
          The "Big" threshold is intended for beginner score attack players. {br}
          Please note that the score threshold is set based on the best scoring shottypes, and as a result, it can be very difficult to achieve the threshold for the weaker scoring shottypes. {br}
          The threshold is set to a round number with these conditions in mind:
        condition_lists:
          not_nnfs: It cannot be achieved just by doing NNFS well
          for_beginners: Can be achieved when the scoring strategies are studied thoroughly
          for_experienced: It cannot be easily achieved by strong players that simply watch someone's replay and imitate the strategies
      great:
        content: |-
          The "Bigger" threshold is meant for players that have just achieved big, and are looking for a moderate threshold before attempting to achieve "Super Big". {br}
          Note that these thresholds are set for the best scoring shottypes, so it may be impossible to achieve this threshold with the weaker shottypes.
      excellent:
        content: |-
          その作品をやり込んだプレイヤーが大目標として掲げるような非常に達成難易度の高い基準スコアです。
          こちらについてはスコアアタック上級者以外が目標とすることを想定してはいません。
          最もスコアが出しやすい機体を基準に設定しているので機体格差が大きい作品では達成が不可能な機体も存在します。
    score_FAQ:
      title: Score FAQ
      good:
        content:
          lists:
            garbage_shot_type:
              question: Q. Are shottypes with weaker scoring potential considered?
              answer: A. We try to seperate thresholds where scoring differences are very large. The thresholds are set based on the best performing shottypes in the group, so it may be more difficult to achieve the threshold with the weak ones.
            th20_fixed_piv:
              question: Q. Can PIV be fixed for FW? 
              answer: A. It has been decided that the threshold will be the score obtained with unfixed PIV. Runs with a fixed PIV score may not be considered, but can still be added if it surpasses the score threshold with unfixed PIV playback.
            win98_support:
              question: Q. Will there be support for the PC-98 games?
              answer: A. There are no plans to support PC-98 games at this moment.
            th09_support:
              question: Q. Will there be support for PoFV?
              answer: A. It could be supported in the future if some thresholds are provided by some expert level players. 
            publish_my_record:
              question: Q. I noticed that my score has not been published. When will my score be published?
              answer: A. It is sometimes possible to miss scores. You can file an issue on {github} or message Balisman on Discord.
              tags:
                github: GitHub
                nyanko: Nyanko
            update_frequency:
              question: Q. When will new records be added to the site?
              answer: A. Varies, 2 weeks at most.
            recommendation:
              question: Q. ズバリどの作品がおすすめですか？
              answer: A. 達成難易度が良心的と思われるのは達成者が多い作品ですが、自分がプレイしたい作品の方がモチベを保ちやすいです
      great:
        content:
          lists:
            score_decrease:
              question: Q. 超大台が達成できない機体があるので基準スコアを下げてくれませんか？
              answer: A. 超大台スコアについては上級者が目指す大目標として設定しているので難易度を理由に基準スコアを下げることはありません。ただし現実的に不可能と考えられる基準スコアについては修正する可能性があります
      excellent:
        content:
          lists:
            score_decrease:
              question: Q. 基準スコアが達成できない機体があるので基準スコアを下げてくれませんか？
              answer: A. 基準スコア(Lunatic)については上級者が目指す大目標として設定しているので難易度を理由に基準スコアを下げることはありません。ただし現実的に達成困難と考えられる基準スコアについては修正する可能性があります。
            difficulty_gap:
              question: Q. 作品間の難易度格差が大きくないでしょうか？
              answer: A. 数字のキリの良さを重視するとどうしても難易度のばらつきが出てしまい、基準スコア(Lunatic)ではその影響がモロに出てしまいますが一定以上の難易度が保証されていれば問題ないと考えています。
    additional_info:
      title: Additional Information
      content: |-
        The difficulty of the "Big" and "Super Big" milestones may differ from game to game. {br}
        It is not set based on difficulty relative to other games, so one threshold for one game might be harder than the threshold for another game. {br}
        Shottypes that have a major difference in scoring will have their own threshold, but in a case such as EoSD, there will only be one threshold despite A shots scoring weaker than B shots. This is because their scoring difference is not great enough to warrant a new threshold.
    operator:
      title: Operator
      content: |-
        {nyanko}
      tags:
        nyanko: Nyanko
    operation_policy:
      title: Operation Policy
      content: |-
        {wefmaika} created the site and has transferred all rights, responsibilities, and obligations, excluding the right to be identified by name, to {nyanko1}. {br}
        So, if you encounter any issues with this site, please contact {nyanko2}. {br}
        The source code for this site is available on {github} under the MIT license. {br}
        However, the MIT license does not apply to replay files and score data for which we do not hold copyright.
      tags:
        wefmaika: WEF
        nyanko1: Nyanko
        nyanko2: Nyanko
        nyanko3: Nyanko
        github: GitHub
